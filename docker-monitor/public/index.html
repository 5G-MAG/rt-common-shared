<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5G-MAG Container Monitor</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <img src="/5gmag.png" class="header-logo" alt="5G-MAG Logo" onerror="this.style.display='none'">
  <h1 class="header-title">Container Monitor</h1>
  <div class="header-right">
    <button class="refresh-btn" onclick="loadContainers()">↻ Refresh</button>
    <button class="refresh-btn toggle-btn active" id="auto-refresh-btn" onclick="toggleAutoRefresh()">⏱ Auto</button>
  </div>
</header>

<div class="summary-bar" id="summary-bar">
  <div class="stat"><span class="stat-dot dot-total"></span><span class="stat-count" id="total">—</span><span class="stat-label">total</span></div>
  <div class="stat"><span class="stat-dot dot-running"></span><span class="stat-count" id="running">—</span><span class="stat-label">running</span></div>
  <div class="stat"><span class="stat-dot dot-exited"></span><span class="stat-count" id="exited">—</span><span class="stat-label">exited</span></div>
  <div class="stat"><span class="stat-dot dot-restart"></span><span class="stat-count" id="restarting">—</span><span class="stat-label">restarting</span></div>
  <div style="margin-left:auto;font-size:11px;color:#64748b;font-weight:400;" id="refresh-info">Auto-refresh every 10s</div>
</div>

<div class="main" id="main">
  <div class="empty">Loading containers…</div>
</div>

</div>
</div>
<div class="overlay" id="overlay" onclick="closeLog()"></div>
<div class="log-panel" id="log-panel">
  <div class="log-resize-handle" id="log-resize-handle"></div>
  <div class="log-header">
    <span class="log-title" id="log-title">Logs</span>
    <button class="close-btn" onclick="closeLog()">✕</button>
  </div>
  <div class="log-body" id="log-body">Loading…</div>
</div>

<script>
const GROUP_ORDER = ['5GC NFs', '5G Multicast Broadcast Services', '5G Media Streaming'];

function stateClass(state) {
  if (state === 'running') return 'running';
  if (state === 'exited') return 'exited';
  if (state === 'restarting') return 'restarting';
  if (state === 'paused') return 'paused';
  return 'created';
}

function pillClass(state) {
  return 'pill-' + stateClass(state);
}

function formatStatus(c) {
  const s = c.status || c.State || '—';
  if (c.state === 'running') return `<span class="pulse"></span>${s}`;
  if (c.state === 'restarting') return `<span class="pulse pulse-amber"></span>${s}`;
  return s;
}

const MBS_NFS = new Set([
  'amf_with_mbs','smf_mb-smf','upf_mb-upf',
  'test_mbs_af_as','gnb_with_mbs','ue_with_mbs'
]);

let VERSIONS = { open5gs: '…', mbs: '…', mongodb: '…' };

async function loadVersions() {
  try {
    const res = await fetch('/api/versions');
    VERSIONS = await res.json();
  } catch(e) {}
}

function parseImage(img) {
  if (!img) return { source: 'unknown', version: '—', isLocal: true };
  if (img.startsWith('ghcr.io/5g-mag/')) {
    const parts = img.split(':');
    const rawName = parts[0].replace('ghcr.io/5g-mag/', '');
    const tagVersion = (parts.length > 1 && parts[1] !== 'latest') ? parts[1] : null;
    let version;
    if (tagVersion) version = tagVersion;
    else if (MBS_NFS.has(rawName)) version = VERSIONS.mbs;
    else version = VERSIONS.open5gs;
    return { source: 'ghcr.io/5g-mag', version, isLocal: false };
  }
  if (img.startsWith('mongo')) {
    const parts = img.split(':');
    const version = (parts.length > 1 && parts[1] !== 'latest') ? parts[1] : VERSIONS.mongodb;
    return { source: 'docker.io', version, isLocal: false };
  }
  return { source: 'local build', version: '—', isLocal: true };
}

function renderContainers(containers) {
  const main = document.getElementById('main');
  if (!containers.length) { main.innerHTML = '<div class="empty">No containers found.</div>'; return; }

  const byGroup = {};
  containers.forEach(c => {
    const g = c.group || 'Other';
    if (!byGroup[g]) byGroup[g] = [];
    byGroup[g].push(c);
  });

  const groupOrder = [...GROUP_ORDER.filter(g => byGroup[g]), ...Object.keys(byGroup).filter(g => !GROUP_ORDER.includes(g))];

  let html = '';

  function renderCard(c) {
    const sc = stateClass(c.state);
    return `<div class="card ${sc}" onclick="openLog('${c.id}','${c.name}')">
      <div class="card-header">
        <span class="card-name">${c.name}</span>
        <span class="status-pill ${pillClass(c.state)}">${c.state}</span>
      </div>
      <div class="card-source${parseImage(c.image).isLocal ? ' source-local' : ''}">${parseImage(c.image).source}</div>
      <div class="card-footer"><span class="version-badge${parseImage(c.image).isLocal ? ' version-local' : ''}">${parseImage(c.image).version}</span><span class="card-status-text">${formatStatus(c)}</span></div>
      <div class="card-lastlog" id="lastlog-${c.id}"><span class="lastlog-badge info">…</span><span class="lastlog-text">loading</span></div>
    </div>`;
  }

  for (const group of groupOrder) {
    html += `<div class="section-title">${group}</div><div class="grid">`;
    byGroup[group].forEach(c => { html += renderCard(c); });
    html += '</div>';
  }

  // Fetch last log for each container async
  containers.forEach(c => {
    fetchLastLog(c.id).then(log => {
      const el = document.getElementById(`lastlog-${c.id}`);
      if (!el) return;
      el.innerHTML = `<span class="lastlog-badge ${log.level}">${log.level === 'warn' ? 'WARN' : log.level.toUpperCase()}</span><span class="lastlog-text" title="${escHtml(log.message)}">${escHtml(log.message)}</span>`;
    });
  });

  const now = new Date().toLocaleTimeString();
  html += `<div class="last-updated">Last updated: ${now}</div>`;
  main.innerHTML = html;

  document.getElementById('total').textContent = containers.length;
  document.getElementById('running').textContent = containers.filter(c => c.state === 'running').length;
  document.getElementById('exited').textContent = containers.filter(c => c.state === 'exited').length;
  document.getElementById('restarting').textContent = containers.filter(c => c.state === 'restarting').length;
}

async function fetchLastLog(id) {
  try {
    const res = await fetch(`/api/containers/${id}/lastlog`);
    return await res.json();
  } catch(e) {
    return { level: 'info', message: '' };
  }
}

async function loadContainers() {
  try {
    const res = await fetch('/api/containers');
    const data = await res.json();
    renderContainers(data);
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="empty">Error connecting to Docker API: ${e.message}</div>`;
  }
}

async function openLog(id, name) {
  document.getElementById('log-title').textContent = name + ' — logs';
  document.getElementById('log-body').textContent = 'Loading…';
  document.getElementById('log-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  try {
    const res = await fetch(`/api/containers/${id}/logs`);
    const data = await res.json();
    const body = document.getElementById('log-body');
    const lines = (data.logs || '').split('\n');
    body.innerHTML = lines.map(line => {
      if (/\bFATAL\b|\bERROR\b|Aborted|core dumped/i.test(line)) return `<span class="log-error">${escHtml(line)}</span>`;
      if (/\bWARNING\b|\bWARN\b/i.test(line)) return `<span class="log-warn">${escHtml(line)}</span>`;
      if (/\bINFO\b|started|running|registered/i.test(line)) return `<span class="log-info">${escHtml(line)}</span>`;
      if (/success|ready|listening/i.test(line)) return `<span class="log-success">${escHtml(line)}</span>`;
      return escHtml(line);
    }).join('\n');
    body.scrollTop = body.scrollHeight;
  } catch (e) {
    document.getElementById('log-body').textContent = 'Failed to load logs: ' + e.message;
  }
}

function closeLog() {
  document.getElementById('log-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let autoRefreshEnabled = true;
let refreshInterval = setInterval(loadContainers, 10000);

function toggleAutoRefresh() {
  autoRefreshEnabled = !autoRefreshEnabled;
  const btn = document.getElementById('auto-refresh-btn');
  const info = document.getElementById('refresh-info');
  if (autoRefreshEnabled) {
    refreshInterval = setInterval(loadContainers, 10000);
    btn.classList.add('active');
    info.textContent = 'Auto-refresh every 10s';
  } else {
    clearInterval(refreshInterval);
    btn.classList.remove('active');
    info.textContent = 'Auto-refresh off';
  }
}

function getContainerState(name) {
  const containers = window._containers || [];
  const c = containers.find(x => x.name === name);
  return c ? c.state : 'unknown';
}

loadVersions().then(() => loadContainers());

function stateColor(state) {
  if (state === 'running') return '#28a745';
  if (state === 'exited') return '#e55353';
  if (state === 'restarting') return '#f0ad4e';
  return '#adb5bd';
}

function renderTopology() {
  const containers = window._containers || [];
  const allNames = ['nrf','db','amf','ausf','udm','smf','pcf','nssf','udr','upf','bsf','webui',
    'application-server','application-function','application-provider','simple-express-server'];
  allNames.forEach(name => {
    const c = containers.find(x => x.name === name);
    const state = c ? c.state : 'unknown';
    const color = stateColor(state);
    const dot = document.getElementById('dot-' + name);
    if (dot) dot.setAttribute('fill', color);
    const g = document.getElementById('tn-' + name);
    if (g) {
      const isMbs = name.startsWith('application') || name === 'simple-express-server';
      const rect = g.querySelector('rect');
      if (rect && !isMbs) rect.setAttribute('stroke', state === 'running' ? '#e2e8f0' : color);
      g.onclick = () => { if (c) openLog(c.id, c.name); };
    }
  });
}

// Draggable resize handle
const handle = document.getElementById('log-resize-handle');
const panel = document.getElementById('log-panel');
let isResizing = false;

handle.addEventListener('mousedown', (e) => {
  isResizing = true;
  handle.classList.add('dragging');
  document.body.style.cursor = 'ew-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const newWidth = window.innerWidth - e.clientX;
  if (newWidth > 300 && newWidth < window.innerWidth * 0.9) {
    panel.style.width = newWidth + 'px';
  }
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  handle.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});
</script>
</body>
</html>
